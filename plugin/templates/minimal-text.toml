# Minimal Text Template
"$schema" = "https://starship.rs/config-schema.json"

palette = "custom"
add_newline = false

# dir git model context cost [budget] [peak]
format = """
$directory \
$git_branch$git_status \
${env_var.CLAUDE_MODEL} \
${env_var.CLAUDE_CONTEXT} \
${env_var.CLAUDE_COST}\
${env_var.CLAUDE_BUDGET_5H_OK}\
${env_var.CLAUDE_BUDGET_5H_WARN}\
${env_var.CLAUDE_BUDGET_5H_CRIT}\
${env_var.CLAUDE_PACE_OK}\
${env_var.CLAUDE_PACE_WARN}\
${env_var.CLAUDE_PACE_CRIT}\
${env_var.CLAUDE_BUDGET_RESET}\
${env_var.CLAUDE_BUDGET_7D_OK}\
${env_var.CLAUDE_BUDGET_7D_WARN}\
${env_var.CLAUDE_BUDGET_7D_CRIT}\
${env_var.CLAUDE_PEAK_ON}\
${env_var.CLAUDE_PEAK_OFF}\
"""

[directory]
style = "fg:directory"
format = "[$path]($style)"
truncation_length = 2
truncate_to_repo = true

[git_branch]
symbol = ""
style = "fg:git_branch"
format = "[$branch]($style)"

[git_status]
style = "fg:git_status"
format = "[($all_status$ahead_behind)]($style)"

[env_var.CLAUDE_MODEL]
variable = "CLAUDE_MODEL"
format = "[$env_value]($style)"
style = "fg:model"

[env_var.CLAUDE_CONTEXT]
variable = "CLAUDE_CONTEXT"
format = "[$env_value]($style)"
style = "fg:context"

[env_var.CLAUDE_COST]
variable = "CLAUDE_COST"
format = "[$env_value]($style)"
style = "fg:cost"

# Budget 5h (3-var pattern: only one is populated at a time)
[env_var.CLAUDE_BUDGET_5H_OK]
variable = "CLAUDE_BUDGET_5H_OK"
format = "[ $env_value]($style)"
style = "fg:budget_ok"

[env_var.CLAUDE_BUDGET_5H_WARN]
variable = "CLAUDE_BUDGET_5H_WARN"
format = "[ $env_value]($style)"
style = "fg:budget_warn"

[env_var.CLAUDE_BUDGET_5H_CRIT]
variable = "CLAUDE_BUDGET_5H_CRIT"
format = "[ $env_value]($style)"
style = "fg:budget_crit"

# Pace indicator (3-var pattern)
[env_var.CLAUDE_PACE_OK]
variable = "CLAUDE_PACE_OK"
format = "[ $env_value]($style)"
style = "fg:budget_ok"

[env_var.CLAUDE_PACE_WARN]
variable = "CLAUDE_PACE_WARN"
format = "[ $env_value]($style)"
style = "fg:budget_warn"

[env_var.CLAUDE_PACE_CRIT]
variable = "CLAUDE_PACE_CRIT"
format = "[ $env_value]($style)"
style = "fg:budget_crit"

# Reset countdown
[env_var.CLAUDE_BUDGET_RESET]
variable = "CLAUDE_BUDGET_RESET"
format = "[ $env_value]($style)"
style = "fg:budget_dim"

# Budget 7d (3-var pattern, auto-shown when relevant)
[env_var.CLAUDE_BUDGET_7D_OK]
variable = "CLAUDE_BUDGET_7D_OK"
format = "[ $env_value]($style)"
style = "fg:budget_ok"

[env_var.CLAUDE_BUDGET_7D_WARN]
variable = "CLAUDE_BUDGET_7D_WARN"
format = "[ $env_value]($style)"
style = "fg:budget_warn"

[env_var.CLAUDE_BUDGET_7D_CRIT]
variable = "CLAUDE_BUDGET_7D_CRIT"
format = "[ $env_value]($style)"
style = "fg:budget_crit"

# Peak/off-peak indicator
[env_var.CLAUDE_PEAK_ON]
variable = "CLAUDE_PEAK_ON"
format = "[ $env_value]($style)"
style = "fg:budget_crit bold"

[env_var.CLAUDE_PEAK_OFF]
variable = "CLAUDE_PEAK_OFF"
format = "[ $env_value]($style)"
style = "fg:budget_dim"

## Custom palette
#
